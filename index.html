<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרשמה לראנק - שרת מיינקראפט</title>
    <style>
        body {
            background-color: #2c2f33;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: #23272a;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            border: 2px solid #7289da;
        }
        h1 { color: #5865F2; }
        button {
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #357ae8; }
        input {
            padding: 10px;
            width: 80%;
            margin: 15px 0;
            border-radius: 5px;
            border: 1px solid #7289da;
            background-color: #40444b;
            color: white;
            text-align: center;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>שרת המיינקראפט של ישראל 🚀</h1>
    <p>התחבר עם גוגל וקבל ראנק מיוחד בדיסקורד שלנו!</p>
    
    <div id="login-section">
        <button onclick="loginWithGoogle()">התחבר באמצעות Google</button>
    </div>

    <div id="discord-section" class="hidden">
        <p>שלום, <span id="user-name"></span>! התחברת בהצלחה.</p>
        <p>עכשיו, אנא הכנס את שם המשתמש שלך בדיסקורד (לדוגמה: username):</p>
        <input type="text" id="discord-username" placeholder="הדיסקורד שלך..."><br>
        <button style="background-color: #5865F2;" onclick="sendToDiscord()">קבלת הראנק</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
    // הגדרות ה-Firebase שלך מתוך התמונה
    const firebaseConfig = {
        apiKey: "AIzaSyBf3a5Q-cDfmVPvto4w-Ue6hpeSJrQPU_k",
        authDomain: "minecraft-israel-auth.firebaseapp.com",
        projectId: "minecraft-israel-auth",
        storageBucket: "minecraft-israel-auth.appspot.com",
        messagingSenderId: "14356543924",
        appId: "1:14356543924:web:c65c811aba1d5766919ae1"
    };
    
    // אתחול Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    let loggedInUser = null;

    // פונקציית התחברות לגוגל
    function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then((result) => {
            loggedInUser = result.user;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('discord-section').classList.remove('hidden');
            document.getElementById('user-name').innerText = loggedInUser.displayName;
        }).catch((error) => {
            console.error("שגיאה ב-Firebase Auth:", error);
            alert("שגיאה בהתחברות: " + error.message);
        });
    }

    // פונקציה ששולחת את המידע לדיסקורד שלך
    function sendToDiscord() {
        const discordName = document.getElementById('discord-username').value;
        if (!discordName) {
            alert("אנא הכנס שם משתמש בדיסקורד");
            return;
        }

        // כאן הגדרתי את ה-Webhook שמקושר לשרת שלך
        const webhookUrl = "https://discord.com/api/webhooks/1382992209707204648/qYyT4G3K-8j-eX7uX4_yR269zV6pLREuXf7X8_Lz3W3k-X5zY_zP";

        const messageData = {
            embeds: [{
                title: "🎉 שחקן חדש נרשם לראנק!",
                color: 5814783,
                fields: [
                    { name: "שם בגוגל:", value: loggedInUser.displayName, inline: true },
                    { name: "אימייל:", value: loggedInUser.email, inline: true },
                    { name: "משתמש דיסקורד שצריך ראנק:", value: discordName, inline: false }
                ]
            }]
        };

        fetch(webhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(messageData)
        }).then(() => {
            alert("ההרשמה הצליחה! מנהל השרת יעניק לך את הראנק בהקדם.");
        }).catch((error) => {
            console.error("שגיאה בשליחת Webhook:", error);
            alert("הייתה בעיה בשליחת הנתונים לדיסקורד.");
        });
    }
</script>

</body>
</html>
