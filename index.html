<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרשמה לראנק - שרת מיינקראפט</title>
    <style>
        body {
            background-color: #2c2f33;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .container {
            background-color: #23272a;
            padding: 30px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            border: 2px solid #7289da;
            /* שיניתי את הרוחב המקסימלי כדי שהסרטון יהיה גדול יותר */
            max-width: 700px;
            width: 100%;
        }
        h1 { color: #5865F2; }
        button {
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #357ae8; }
        input {
            padding: 10px;
            width: 80%;
            margin: 15px 0;
            border-radius: 5px;
            border: 1px solid #7289da;
            background-color: #40444b;
            color: white;
            text-align: center;
        }
        .hidden { display: none; }
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* יחס מסך 16:9 */
            height: 0;
            overflow: hidden;
            max-width: 100%;
            background: #000;
            border-radius: 8px;
            margin: 15px 0;
            border: 1px solid #7289da;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .instructions {
            font-size: 14px;
            color: #b9bbbe;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>שרת המיינקראפט של ישראל 🚀</h1>
    <p>התחבר עם גוגל וקבל ראנק מיוחד בדיסקורד שלנו!</p>
    
    <div id="login-section">
        <button onclick="loginWithGoogle()">התחבר באמצעות Google</button>
    </div>

    <div id="discord-section" class="hidden">
        <p>שלום, <span id="user-name"></span>! התחברת בהצלחה.</p>
        
        <hr style="border-color: #4f545c; margin: 20px 0;">
        
        <p class="instructions">🎥 צפה בסרטון ההסבר כדי להבין איך להשיג את ה-User ID שלך:</p>
        
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/EVXZy7cWVjk?autoplay=1&loop=1&playlist=EVXZy7cWVjk&controls=0&disablekb=1&modestbranding=1&fs=0" allowfullscreen></iframe>
        </div>

        <p>אנא הכנס את ה-**User ID** שלך בדיסקורד (מספרים בלבד):</p>
        <input type="text" id="discord-username" placeholder="הדבק את ה-ID כאן..."><br>
        <button style="background-color: #5865F2;" onclick="sendToDiscord()">קבלת הראנק</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script>
    // הגדרות ה-Firebase שלך
    const firebaseConfig = {
        apiKey: "AIzaSyBf3a5Q-cDfmVPvto4w-Ue6hpeSJrQPU_k",
        authDomain: "minecraft-israel-auth.firebaseapp.com",
        projectId: "minecraft-israel-auth",
        storageBucket: "minecraft-israel-auth.appspot.com",
        messagingSenderId: "14356543924",
        appId: "1:14356543924:web:c65c811aba1d5766919ae1"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    let loggedInUser = null;

    function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).then((result) => {
            loggedInUser = result.user;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('discord-section').classList.remove('hidden');
            document.getElementById('user-name').innerText = loggedInUser.displayName;
        }).catch((error) => {
            console.error(error);
            alert("שגיאה בהתחברות: " + error.message);
        });
    }

    function sendToDiscord() {
        const discordName = document.getElementById('discord-username').value;
        if (!discordName) {
            alert("אנא הכנס את ה-User ID שלך בדיסקורד");
            return;
        }

        const makeWebhookUrl = "https://hook.eu1.make.com/onae45sqzvwee9crssbk2a35297tbwwd";

        const messageData = {
            googleName: loggedInUser.displayName,
            email: loggedInUser.email,
            discordUser: discordName
        };

        fetch(makeWebhookUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(messageData)
        }).then(() => {
            alert("ההרשמה הצליחה! הראנק שלך יתעדכן בדיסקורד אוטומטית תוך מספר שניות.");
        }).catch((error) => {
            console.error(error);
            alert("הייתה בעיה בשליחת הנתונים.");
        });
    }
</script>

</body>
</html>
